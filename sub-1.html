<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon -->
    <link
      rel="icon"
      type="image/png"
      href="assets/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="KOSAF" />
    <link rel="manifest" href="assets/favicon/site.webmanifest" />

    <!-- 폰트어썸 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- aos -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <!-- aos -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- css -->
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/p_main/header.css" />
    <link rel="stylesheet" href="css/p_sub1/p_sub1.css" />
    <title>마이페이지</title>
  </head>

  <body>
    <div class="wrap">
      <!-- 헤더 -->
      <header class="header">
        <div class="inner">
          <div class="logo">
            <a href="#"
              ><img src="images/logo/kosaf_logo.svg" alt="kosaf_logo"
            /></a>
          </div>
          <ul class="menu">
            <li><a href="#">장학금</a></li>
            <li><a href="#">학자금대출</a></li>
            <li><a href="#">기숙사</a></li>
            <li><a href="#">재단소개</a></li>
            <li><a href="#">고객센터</a></li>
            <li>
              <a href="#"
                ><i
                  class="fa-solid fa-arrow-right-to-bracket"
                  style="color: rgb(0, 0, 0)"
                ></i
              ></a>
            </li>
            <li>
              <a href="#"
                ><i
                  class="fa-solid fa-user-plus"
                  style="color: rgb(0, 0, 0)"
                ></i
              ></a>
            </li>
          </ul>
          <div class="mobile-btn">☰</div>
        </div>
      </header>

      <!-- 그룹1 -->
      <div class="container1">
        <div class="inner">
          <div class="left">
            <h1><span>홍길동</span>님, 안녕하세요!</h1>

            <p>배움의 여정을 응원합니다.</p>
            <p>장학금 및 학자금 서비스를 한눈에 확인해보세요.</p>
          </div>
          <div class="right">
            <img src="images/ai/school.png" alt="학교" />
          </div>
        </div>
      </div>

      <!-- 그룹2 -->

      <div class="container2">
        <div class="inner">
          <!-- 왼쪽구간 -->
          <div class="inner-left">
            <img src="images/ai/quick.png" alt="이미지" />

            <div class="user_info">
              <div class="name">
                <h2>홍길동</h2>
                <button>재학중</button>
              </div>

              <p>
                OO 대학교 OO 학과 3학년 <br />
                학번 : 20260123
              </p>

              <button class="my_button">
                내 정보 관리

                <span
                  ><i
                    class="fa-solid fa-chevron-right"
                    style="color: rgb(145, 145, 145)"
                  ></i>
                </span>
              </button>
            </div>
          </div>
          <!-- 오른쪽 구간 -->
          <div class="inner-right">
            <!-- 최근알림 -->

            <div class="card1">
              <div class="card-icon">
                <i
                  class="fa-regular fa-bell"
                  style="color: rgb(255, 176, 65)"
                ></i>
              </div>

              <p class="card-txt1">최근 알림</p>

              <p class="card-txt2">새로운 알림이 3건 있어요</p>

              <button>알림 확인</button>
            </div>
            <!-- 제출 필요 서류 -->
            <div class="card2">
              <div class="card-icon">
                <i
                  class="fa-regular fa-file-lines"
                  style="color: rgb(0, 134, 205)"
                ></i>
              </div>
              <p class="card-txt1">재출 필요 서류</p>

              <p class="card-txt2">1건</p>

              <button>서류 확인</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 그룹3 -->

    <!-- 상단 -->
    <div class="container3">
      <div class="inner">
        <div class="top-txt">
          <h1>2026 2학기 신청 진행 현황</h1>
          <button class="btn-detail">
            신청현황 자세히 보기
            <span
              ><i
                class="fa-solid fa-chevron-right"
                style="color: rgb(145, 145, 145)"
              ></i>
            </span>
          </button>
        </div>

        <!-- 하단 -->
        <div class="step1-4">
          <div class="step">
            <span class="step-number">STEP1</span>
            <i class="fa-regular fa-clipboard step-icon"></i>
            <h3>가구원 동의</h3>
            <p>완료</p>
          </div>

          <div class="arrow">
            <i class="fa-solid fa-arrow-right"></i>
          </div>

          <div class="step active">
            <span class="step-number">STEP 2</span>
            <i class="fa-regular fa-pen-to-square step-icon"></i>
            <h3>지원구간 산정</h3>
            <p>진행중</p>
          </div>

          <div class="arrow">
            <i class="fa-solid fa-arrow-right"></i>
          </div>

          <div class="step">
            <span class="step-number">STEP 3</span>
            <i class="fa-regular fa-file-lines step-icon"></i>
            <h3>학생정보 심사</h3>
            <p>대기</p>
          </div>

          <div class="arrow">
            <i class="fa-solid fa-arrow-right"></i>
          </div>

          <div class="step">
            <span class="step-number">STEP 4</span>
            <i class="fa-regular fa-square-check step-icon"></i>
            <h3>장학금 지급</h3>
            <p>대기</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
